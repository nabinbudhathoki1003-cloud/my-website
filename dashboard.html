<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      text-align: center;
      color: white;
    }

    .box {
      margin-top: 100px;
      background: rgba(255,255,255,0.2);
      padding: 30px;
      border-radius: 15px;
      display: inline-block;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: white;
      color: black;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: lightgray;
    }
  </style>

</head>
<body>

  <div class="box">
    <h1>Welcome Admin 🎉</h1>
    <p>You are successfully logged in</p>

    <button onclick="window.location.href='index.html'">
      Logout
    </button>
  </div>

</body>
</html>
